<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Managed Terrain Target Height Brush</title>
  <link rel="stylesheet" href="target_height_brush.css">
</head>
<body>
  <main class="palette">
    <section class="row">
      <span class="mode" id="mode">target_height</span>
      <span class="terrain" id="selectedTerrain">No terrain selected</span>
    </section>

    <section class="controls">
      <label for="targetElevation">Target elevation</label>
      <input id="targetElevation" name="targetElevation" type="number" step="0.01">

      <label for="radius">Radius</label>
      <input id="radius" name="radius" type="number" min="0.01" step="0.01" value="2.0">

      <label for="blendDistance">Blend distance</label>
      <input id="blendDistance" name="blendDistance" type="number" min="0" step="0.01" value="0.0">

      <label for="falloff">Falloff</label>
      <select id="falloff" name="falloff">
        <option value="none">none</option>
        <option value="linear">linear</option>
        <option value="smooth">smooth</option>
      </select>
    </section>

    <section class="status" id="status">Ready</section>
  </main>
  <script src="target_height_brush.js"></script>
</body>
</html>
