inherit_mode:
  merge:
    - Exclude

plugins:
  - rubocop-sketchup

AllCops:
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - ".bundle/**/*"
    - "python/**/*"
    - "vendor/**/*"

Layout/LineLength:
  Max: 100

Metrics/BlockLength:
  Exclude:
    - "rakelib/**/*.rake"

Metrics/MethodLength:
  Max: 15
  Exclude:
    - "rakelib/**/*.rb"
    - "src/su_mcp/transport/socket_server.rb"

Metrics/AbcSize:
  Max: 20
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Metrics/BlockNesting:
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Metrics/ClassLength:
  Max: 150
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Metrics/CyclomaticComplexity:
  Max: 7
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Metrics/ModuleLength:
  Exclude:
    - "rakelib/**/*.rb"

Metrics/ParameterLists:
  Max: 5
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Metrics/PerceivedComplexity:
  Max: 8
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Naming/FileName:
  Exclude:
    - "src/su_mcp.rb"

Naming/ClassAndModuleCamelCase:
  AllowedNames:
    - "SU_MCP"

SketchupRequirements/ExtensionNamespace:
  Exclude:
    - "Gemfile"
    - "Rakefile"
    - "rakelib/**/*"
    - "test/**/*"

SketchupRequirements/FileStructure:
  Exclude:
    - "Gemfile"
    - "Rakefile"
    - "rakelib/**/*"
    - "test/**/*"

SketchupRequirements/ApiNamespace:
  Exclude:
    - "test/**/*"

SketchupRequirements/GlobalConstants:
  Exclude:
    - "test/**/*"

SketchupRequirements/GlobalMethods:
  Exclude:
    - "test/**/*"

SketchupRequirements/LoadPath:
  Exclude:
    # The staged runtime loader intentionally extends the load path for vendored gems.
    - "src/su_mcp/runtime/native/mcp_runtime_loader.rb"

SketchupRequirements/RubyCoreNamespace:
  Exclude:
    - "test/**/*"

SketchupSuggestions/FileEncoding:
  Exclude:
    - "Rakefile"
    - "rakelib/**/*"
    - "test/**/*"
    - "src/su_mcp/extension.rb"
