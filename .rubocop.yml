inherit_mode:
  merge:
    - Exclude

plugins:
  - rubocop-sketchup

AllCops:
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - ".bundle/**/*"
    - "python/**/*"
    - "vendor/**/*"

Layout/LineLength:
  Max: 100

Lint/RedundantCopDisableDirective:
  Enabled: false

Metrics/BlockLength:
  Max: 40
  Exclude:
    - "rakelib/**/*.rake"

Metrics/MethodLength:
  Max: 35
  CountAsOne:
    - array
    - hash
    - heredoc
    - method_call
  Exclude:
    - "rakelib/**/*.rb"
    - "src/su_mcp/transport/socket_server.rb"

Metrics/AbcSize:
  Max: 30
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Metrics/BlockNesting:
  Max: 4
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Metrics/ClassLength:
  Max: 220
  CountAsOne:
    - array
    - hash
    - heredoc
    - method_call
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Metrics/CyclomaticComplexity:
  Max: 10
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Metrics/ModuleLength:
  Max: 220
  CountAsOne:
    - array
    - hash
    - heredoc
    - method_call
  Exclude:
    - "rakelib/**/*.rb"

Metrics/ParameterLists:
  Max: 6
  CountKeywordArgs: false
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Metrics/PerceivedComplexity:
  Max: 12
  Exclude:
    - "src/su_mcp/transport/socket_server.rb"

Naming/FileName:
  Exclude:
    - "src/su_mcp.rb"

Naming/ClassAndModuleCamelCase:
  AllowedNames:
    - "SU_MCP"

Naming/MethodParameterName:
  MinNameLength: 2
  AllowedNames:
    - x
    - y
    - z
    - u
    - v
    - i
    - j
    - k
    - id
    - io
    - dx
    - dy
    - dz
    - pt

SketchupRequirements/ExtensionNamespace:
  Exclude:
    - "Gemfile"
    - "Rakefile"
    - "rakelib/**/*"
    - "test/**/*"

SketchupRequirements/FileStructure:
  Exclude:
    - "Gemfile"
    - "Rakefile"
    - "rakelib/**/*"
    - "test/**/*"

SketchupRequirements/ApiNamespace:
  Exclude:
    - "test/**/*"

SketchupRequirements/GlobalConstants:
  Exclude:
    - "test/**/*"

SketchupRequirements/GlobalMethods:
  Exclude:
    - "test/**/*"

SketchupRequirements/LoadPath:
  Exclude:
    # The staged runtime loader intentionally extends the load path for vendored gems.
    - "src/su_mcp/runtime/native/mcp_runtime_loader.rb"

SketchupRequirements/RubyCoreNamespace:
  Exclude:
    - "test/**/*"

SketchupSuggestions/FileEncoding:
  Exclude:
    - "Rakefile"
    - "rakelib/**/*"
    - "test/**/*"
    - "src/su_mcp/extension.rb"
