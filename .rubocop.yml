inherit_mode:
  merge:
    - Exclude

plugins:
  - rubocop-sketchup

AllCops:
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - ".bundle/**/*"
    - "python/**/*"
    - "vendor/**/*"

Layout/LineLength:
  Max: 100

Metrics/BlockLength:
  Exclude:
    - "rakelib/**/*.rake"

Metrics/MethodLength:
  Exclude:
    - "rakelib/**/*.rb"
    - "src/su_mcp/socket_server.rb"

Metrics/AbcSize:
  Exclude:
    - "src/su_mcp/socket_server.rb"

Metrics/BlockNesting:
  Exclude:
    - "src/su_mcp/socket_server.rb"

Metrics/ClassLength:
  Exclude:
    - "src/su_mcp/socket_server.rb"

Metrics/CyclomaticComplexity:
  Exclude:
    - "src/su_mcp/socket_server.rb"

Metrics/ModuleLength:
  Exclude:
    - "rakelib/**/*.rb"

Metrics/ParameterLists:
  Exclude:
    - "src/su_mcp/socket_server.rb"

Metrics/PerceivedComplexity:
  Exclude:
    - "src/su_mcp/socket_server.rb"

Naming/FileName:
  Exclude:
    - "src/su_mcp.rb"

Naming/ClassAndModuleCamelCase:
  AllowedNames:
    - "SU_MCP"

SketchupRequirements/ExtensionNamespace:
  Exclude:
    - "Gemfile"
    - "Rakefile"
    - "rakelib/**/*"
    - "test/**/*"

SketchupRequirements/FileStructure:
  Exclude:
    - "Gemfile"
    - "Rakefile"
    - "rakelib/**/*"
    - "test/**/*"

SketchupRequirements/ApiNamespace:
  Exclude:
    - "test/**/*"

SketchupRequirements/GlobalConstants:
  Exclude:
    - "test/**/*"

SketchupRequirements/GlobalMethods:
  Exclude:
    - "test/**/*"

SketchupRequirements/RubyCoreNamespace:
  Exclude:
    - "test/**/*"

SketchupSuggestions/FileEncoding:
  Exclude:
    - "Rakefile"
    - "rakelib/**/*"
    - "test/**/*"
    - "src/su_mcp/extension.rb"
