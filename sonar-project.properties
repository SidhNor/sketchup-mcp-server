sonar.projectKey=SidhNor_sketchup-mcp-server
sonar.organization=sidhnor

sonar.sources=src,rakelib
sonar.tests=test
sonar.ruby.coverage.reportPaths=coverage/coverage.json
sonar.exclusions=coverage/**,pkg/**,tmp/**,vendor/**

# RuboCop Style/RedundantException intentionally prefers Ruby's default
# RuntimeError form: raise "message".
sonar.issue.ignore.multicriteria=ruby_string_raise
sonar.issue.ignore.multicriteria.ruby_string_raise.ruleKey=rubydre:S7815
sonar.issue.ignore.multicriteria.ruby_string_raise.resourceKey=**/*.rb
