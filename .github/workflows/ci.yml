name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruby:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Run Ruby checks
        run: bundle exec rake version:assert ruby:lint ruby:test package:verify
