name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Run checks
        run: bundle exec rake ci

      - name: Release version
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          uv run semantic-release --strict -v version
          status=$?
          if [ "$status" -eq 0 ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$status" -eq 2 ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exit "$status"

      - name: Upload RBZ assets to the GitHub release
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release -v publish
