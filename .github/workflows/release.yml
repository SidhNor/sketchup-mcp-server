name: Release

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install semantic-release
        run: python -m pip install python-semantic-release==10.5.3

      - name: Release version
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          semantic-release --config releaserc.toml --strict -v version --no-vcs-release
          status=$?
          if [ "$status" -eq 0 ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$status" -eq 2 ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exit "$status"

      - name: Create GitHub release
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NOTES: ${{ steps.release.outputs.release_notes }}
        run: |
          notes_file="$(mktemp)"
          printf '%s' "$RELEASE_NOTES" > "$notes_file"
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file "$notes_file"

      - name: Upload RBZ assets to the GitHub release
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: semantic-release --config releaserc.toml -v publish --tag "$RELEASE_TAG"
